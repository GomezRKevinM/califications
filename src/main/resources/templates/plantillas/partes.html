<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{index.title}"></title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <header th:fragment="cabecero">
        <h1 class="text-2xl text-cyan-500 font-bold p-4" th:text="#{plantilla.titulo}">El titulo</h1>
    </header>

    <footer class="fixed bottom-0 flex justify-center gap-8 text-white bg-cyan-500 w-full" th:fragment="pie">
        <span th:text="#{plantilla.pie}">El pie</span>
        <p>
            <a href="https://www.youtube.com/@learing-soft"> Canal de Youtube</a>
        </p>
    </footer>
</body>
</html>
