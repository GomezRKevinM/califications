<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <title>Datos del usuario</title>
</head>
<body>
    <h1>[[#{usuario.formulario}]]</h1>
    <a th:href="@{/}">[[#{accion.regresar}]]</a>
    <br>
    <form th:action="@{/guardar}" method="POST" th:object="${usuario}">
        <br>
        <labe for="cedula" th:text="#{usuario.cedula}"></labe>
        <input type="text" name="cedula" th:field="*{cedula}" required/>
        <br>
        <label for="clave" th:text="#{usuario.clave}"></label>
        <input type="password" name="clave" th:field="*{clave}"/>
        <br>
        <label for="nombre" th:text="#{usuario.nombre}"></label>
        <input type="text" name="nombre" th:field="*{nombre}" required/>
        <br>
        <label for="email" th:text="#{usuario.email}"></label>
        <input type="email" name="email" th:field="*{email}"/>
        <br>
        <input type="reset" th:value="#{accion.reiniciar}"/> &nbsp;&nbsp;&nbsp;
        <input type="submit" name="guardar" th:value="#{accion.guardar}" />
    </form>
</body>
</html>
