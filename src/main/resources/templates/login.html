<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="plantillas/partes :: head('Login')"></head>
  <style>
    @keyframes vibrate{
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }
  </style>
  <body class="flex select-none flex-col items-center justify-center min-h-screen bg-gray-50">
    <div class="flex flex-col items-center justify-center bg-white shadow-lg w-lg rounded-lg p-8">

      <h2 class="text-2xl font-bold text-cyan-300 mb-5">Login</h2>

      <form class="w-full" th:action="@{/login}" method="post">

        <div class="bg-white p-2 relative rounded-lg group">
          <input class="peer outline-cyan-300 p-2 border-1 border-gray-200 w-full rounded-lg" type="email" name="email" id="email" />
          <label id="username-label" class="absolute px-1 transition-all duration-200 ease-in-out group-focus-within:-top-1 group-focus-within:bg-white group-focus-within:text-cyan-300 top-4 top-4 left-5 text-gray-200" for="email"><i class="bi bi-person-fill"></i> Username</label>
        </div>

        <div class="bg-white p-2 relative rounded-lg group">
          <label id="password-label" class="absolute px-1 transition-all duration-200 ease-in-out group-focus-within:-top-1 group-focus-within:bg-white group-focus-within:text-cyan-300 top-4 left-5 text-gray-200" for="password"><i class="bi bi-shield-lock-fill"></i> Password:</label>
          <input class="outline-cyan-30 bg-hidden p-2 border-1 border-gray-200 w-full rounded-lg" type="password" name="password" id="password" />
          <i class="bi bi-eye-slash-fill hover:text-cyan-300 hover:cursor-pointer absolute left-100 text-gray-200 text-xl top-4"></i>
        </div>

        <div class="w-full flex items-center justify-center">
          <input class="px-4 text-gray-50 py-2 rounded-lg bg-cyan-300" type="submit" value="Login" />
        </div>

      </form>
    </div>
    <div th:if="${param.error}" class="text-red-300 p-2 text-xl">Credenciales inválidas</div>
    <div th:if="${param.logout}" class="text-indigo-300 p-2 text-xl">Sesión cerrada</div>
    <script>
        const passwordInput = document.getElementById('password');
        const togglePassword = document.querySelector('.bi-eye-slash-fill');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('bi-eye-fill');
            togglePassword.classList.toggle('bi-eye-slash-fill');
        });

        const labels = document.querySelectorAll('label')

        labels.forEach(label => {
            const input = document.getElementById(label.getAttribute('for'));
            input.addEventListener('input', () => {
                if (input.value != null && !input.value.empty) {
                    label.classList.add('-top-1', 'bg-white', 'text-cyan-300');
                    label.classList.remove('top-4');
                } else {
                    label.classList.remove('-top-1', 'bg-white', 'text-cyan-300');
                    label.classList.add('top-4', 'text-gray-200');
                }
            });
        });

    </script>
  </body>
</html>
