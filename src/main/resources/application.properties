spring.application.name=califications
server.port=9090
spring.thymeleaf.cache=false
spring.datasource.url=jdbc:mysql://localhost/crud_usuarios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# ESTO ES PARA PODER VER EN EL LOG  DEL SQL QUE SE HA GENERADO EN CADA OPERACIÓN
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE